<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980" role="img" aria-labelledby="title desc">
  <title id="title">Sonic Data Lineage Extract Architecture</title>
  <desc id="desc">High level architecture diagram showing where JavaScript performs deterministic lineage extraction and where AI assists with planning, review, and explanation.</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#e8eef7" stroke-width="1"/>
    </pattern>
    <linearGradient id="jsGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0c57d6"/>
      <stop offset="1" stop-color="#123a8f"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="sourceGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#e8f4ff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="outputGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eafaf5"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0b1b3d" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#0f172a"/>
    </marker>
    <marker id="aiArrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#6d28d9"/>
    </marker>
    <style>
      .title { font: 800 56px Arial, Helvetica, sans-serif; fill: #06143d; }
      .subtitle { font: italic 700 27px Arial, Helvetica, sans-serif; fill: #0757d6; }
      .section-title { font: 800 27px Arial, Helvetica, sans-serif; fill: #0b2f78; }
      .small-title { font: 800 21px Arial, Helvetica, sans-serif; fill: #0b2f78; }
      .body { font: 500 16px Arial, Helvetica, sans-serif; fill: #172033; }
      .body-small { font: 500 14px Arial, Helvetica, sans-serif; fill: #172033; }
      .label { font: 800 18px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .phase-num { font: 900 34px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .js-text { font: 800 20px Arial, Helvetica, sans-serif; fill: #0b4fc7; }
      .ai-text { font: 800 20px Arial, Helvetica, sans-serif; fill: #6d28d9; }
      .note { font: italic 600 15px Arial, Helvetica, sans-serif; fill: #0f3a84; }
      .box { fill: #ffffff; stroke: #2c6bed; stroke-width: 2; rx: 16; filter: url(#shadow); }
      .source-box { fill: url(#sourceGrad); stroke: #2c6bed; stroke-width: 2; rx: 16; filter: url(#shadow); }
      .output-box { fill: url(#outputGrad); stroke: #10a37f; stroke-width: 2; rx: 16; filter: url(#shadow); }
      .js-box { fill: #f8fbff; stroke: #0c57d6; stroke-width: 3; rx: 18; filter: url(#shadow); }
      .ai-box { fill: #fbf8ff; stroke: #7c3aed; stroke-width: 2.5; stroke-dasharray: 9 7; rx: 18; filter: url(#shadow); }
      .card { fill: #ffffff; stroke: #98b8ed; stroke-width: 1.5; rx: 10; }
      .ai-card { fill: #ffffff; stroke: #a78bfa; stroke-width: 1.5; rx: 10; }
      .output-card { fill: #ffffff; stroke: #5fc5a6; stroke-width: 1.5; rx: 10; }
      .arrow { stroke: #0f172a; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .ai-line { stroke: #6d28d9; stroke-width: 3; fill: none; stroke-dasharray: 8 7; marker-end: url(#aiArrow); }
      .divider { stroke: #c9d7ee; stroke-width: 1.5; stroke-dasharray: 6 8; }
    </style>
  </defs>

  <rect width="1800" height="980" fill="#ffffff"/>
  <rect width="1800" height="980" fill="url(#grid)" opacity="0.75"/>

  <text x="900" y="72" text-anchor="middle" class="title">Sonic Data Lineage Extract Architecture</text>
  <text x="900" y="114" text-anchor="middle" class="subtitle">JavaScript creates lineage facts; AI actively supports onboarding, review, and bounded descriptions</text>

  <!-- Sources -->
  <g transform="translate(35,185)">
    <rect class="source-box" width="245" height="470"/>
    <text x="122" y="42" text-anchor="middle" class="section-title">Source Systems</text>
    <rect x="24" y="78" width="197" height="72" class="card"/>
    <text x="80" y="108" text-anchor="middle" class="small-title">SQL Server</text>
    <text x="80" y="130" text-anchor="middle" class="body-small">tables, views, procs</text>
    <circle cx="182" cy="113" r="20" fill="#0c57d6"/>
    <text x="182" y="121" text-anchor="middle" class="label">DB</text>

    <rect x="24" y="174" width="197" height="72" class="card"/>
    <text x="82" y="204" text-anchor="middle" class="small-title">SSIS / SSISDB</text>
    <text x="82" y="226" text-anchor="middle" class="body-small">packages, tasks, jobs</text>
    <circle cx="182" cy="209" r="20" fill="#7c3aed"/>
    <text x="182" y="217" text-anchor="middle" class="label">ETL</text>

    <rect x="24" y="270" width="197" height="72" class="card"/>
    <text x="83" y="300" text-anchor="middle" class="small-title">Snowflake</text>
    <text x="83" y="322" text-anchor="middle" class="body-small">schemas, tables, views</text>
    <circle cx="182" cy="305" r="20" fill="#06b6d4"/>
    <text x="182" y="313" text-anchor="middle" class="label">SF</text>

    <rect x="24" y="366" width="197" height="72" class="card"/>
    <text x="84" y="396" text-anchor="middle" class="small-title">ADF / SSRS</text>
    <text x="84" y="418" text-anchor="middle" class="body-small">support metadata</text>
    <circle cx="182" cy="401" r="20" fill="#f97316"/>
    <text x="182" y="409" text-anchor="middle" class="label">MD</text>
  </g>

  <!-- JS Heavy Lifting Main Container -->
  <g transform="translate(345,155)">
    <rect class="js-box" width="1040" height="560"/>
    <text x="520" y="46" text-anchor="middle" class="section-title">JavaScript Heavy Lifting Zone</text>
    <text x="520" y="76" text-anchor="middle" class="note">source access, parsing, normalization, incremental comparison, packaging, validation</text>

    <g transform="translate(38,120)">
      <rect class="card" width="210" height="310"/>
      <text x="105" y="36" text-anchor="middle" class="small-title">1. Connector Runtime</text>
      <rect x="28" y="67" width="154" height="54" rx="12" fill="url(#jsGrad)"/>
      <text x="105" y="91" text-anchor="middle" class="label">Saved</text>
      <text x="105" y="112" text-anchor="middle" class="label">Connectors</text>
      <text x="28" y="160" class="body-small">• credential references</text>
      <text x="28" y="186" class="body-small">• extractionKernel.js</text>
      <text x="28" y="212" class="body-small">• SQL / SSIS / Snowflake</text>
      <text x="28" y="238" class="body-small">• canonical events</text>
    </g>

    <g transform="translate(300,120)">
      <rect class="card" width="220" height="310"/>
      <text x="110" y="36" text-anchor="middle" class="small-title">2. Metadata Ingest</text>
      <rect x="30" y="67" width="160" height="54" rx="12" fill="url(#jsGrad)"/>
      <text x="110" y="91" text-anchor="middle" class="label">Incremental</text>
      <text x="110" y="112" text-anchor="middle" class="label">Scripts</text>
      <text x="28" y="160" class="body-small">• SQL Server ingest</text>
      <text x="28" y="186" class="body-small">• SSIS ingest</text>
      <text x="28" y="212" class="body-small">• Snowflake ingest</text>
      <text x="28" y="238" class="body-small">• signatures compare</text>
      <text x="28" y="264" class="body-small">• changed-only writes</text>
    </g>

    <g transform="translate(572,120)">
      <rect class="card" width="220" height="310"/>
      <text x="110" y="36" text-anchor="middle" class="small-title">3. Catalog Rebuild</text>
      <rect x="30" y="67" width="160" height="54" rx="12" fill="url(#jsGrad)"/>
      <text x="110" y="91" text-anchor="middle" class="label">Resolve</text>
      <text x="110" y="112" text-anchor="middle" class="label">Lineage</text>
      <text x="28" y="160" class="body-small">• parse SQL references</text>
      <text x="28" y="186" class="body-small">• parse SSIS evidence</text>
      <text x="28" y="212" class="body-small">• alias canonicalization</text>
      <text x="28" y="238" class="body-small">• reads / writes / calls</text>
      <text x="28" y="264" class="body-small">• confidence scoring</text>
    </g>

    <g transform="translate(844,120)">
      <rect class="card" width="158" height="310"/>
      <text x="79" y="36" text-anchor="middle" class="small-title">4. Runtime</text>
      <text x="79" y="61" text-anchor="middle" class="small-title">Package</text>
      <rect x="22" y="83" width="114" height="54" rx="12" fill="url(#jsGrad)"/>
      <text x="79" y="107" text-anchor="middle" class="label">Validate</text>
      <text x="79" y="128" text-anchor="middle" class="label">Publish</text>
      <text x="24" y="174" class="body-small">• manifest</text>
      <text x="24" y="200" class="body-small">• registry</text>
      <text x="24" y="226" class="body-small">• indexes</text>
      <text x="24" y="252" class="body-small">• checks</text>
      <text x="24" y="278" class="body-small">• readback</text>
    </g>

    <path class="arrow" d="M 248 276 L 293 276"/>
    <path class="arrow" d="M 520 276 L 565 276"/>
    <path class="arrow" d="M 792 276 L 837 276"/>

    <g transform="translate(160,472)">
      <rect x="0" y="0" width="720" height="56" rx="16" fill="#eef6ff" stroke="#6aa0ee" stroke-width="1.5" stroke-dasharray="8 7"/>
      <text x="360" y="24" text-anchor="middle" class="note">Default mode: incremental refresh compares signatures to the DevOps registry</text>
      <text x="360" y="45" text-anchor="middle" class="body-small">Full refresh only when explicitly approved</text>
    </g>
  </g>

  <!-- Output Targets -->
  <g transform="translate(1450,185)">
    <rect class="output-box" width="305" height="470"/>
    <text x="152" y="42" text-anchor="middle" class="section-title" fill="#0f766e">Outputs</text>
    <rect x="28" y="78" width="249" height="72" class="output-card"/>
    <text x="152" y="108" text-anchor="middle" class="small-title">Azure DevOps Repo</text>
    <text x="152" y="130" text-anchor="middle" class="body-small">machine-readable master</text>

    <rect x="28" y="174" width="249" height="72" class="output-card"/>
    <text x="152" y="204" text-anchor="middle" class="small-title">Runtime Package</text>
    <text x="152" y="226" text-anchor="middle" class="body-small">manifest, indexes, context packs</text>

    <rect x="28" y="270" width="249" height="72" class="output-card"/>
    <text x="152" y="300" text-anchor="middle" class="small-title">Confluence</text>
    <text x="152" y="322" text-anchor="middle" class="body-small">human catalog and Rovo pages</text>

    <rect x="28" y="366" width="249" height="72" class="output-card"/>
    <text x="152" y="396" text-anchor="middle" class="small-title">Data Governance App</text>
    <text x="152" y="418" text-anchor="middle" class="body-small">APIs, UI, lineage answers</text>
  </g>

  <path class="arrow" d="M 280 420 L 338 420"/>
  <path class="arrow" d="M 1388 420 L 1442 420"/>

  <!-- AI Active Role -->
  <g transform="translate(150,755)">
    <rect class="ai-box" width="1500" height="150"/>
    <text x="750" y="36" text-anchor="middle" class="section-title" fill="#6d28d9">AI Active Role Zone For New Dataset Onboarding</text>
    <line x1="480" y1="55" x2="480" y2="132" class="divider"/>
    <line x1="1010" y1="55" x2="1010" y2="132" class="divider"/>

    <g transform="translate(38,58)">
      <circle cx="40" cy="38" r="34" fill="url(#aiGrad)"/>
      <text x="40" y="49" text-anchor="middle" class="phase-num">1</text>
      <text x="94" y="29" class="ai-text">Plan onboarding</text>
      <text x="94" y="55" class="body">ADRs, backlog, work packets, source</text>
      <text x="94" y="78" class="body">scope, approvals, and run strategy</text>
    </g>

    <g transform="translate(535,58)">
      <circle cx="40" cy="38" r="34" fill="url(#aiGrad)"/>
      <text x="40" y="49" text-anchor="middle" class="phase-num">2</text>
      <text x="94" y="29" class="ai-text">Review and investigate</text>
      <text x="94" y="55" class="body">Readbacks, suspicious lineage gaps,</text>
      <text x="94" y="78" class="body">alias issues, and targeted traces</text>
    </g>

    <g transform="translate(1060,58)">
      <circle cx="40" cy="38" r="34" fill="url(#aiGrad)"/>
      <text x="40" y="49" text-anchor="middle" class="phase-num">3</text>
      <text x="94" y="29" class="ai-text">Draft descriptions</text>
      <text x="94" y="55" class="body">Plain-English Confluence text and</text>
      <text x="94" y="78" class="body">summaries from bounded evidence</text>
    </g>
  </g>

  <path class="ai-line" d="M 445 754 C 480 700, 585 690, 660 705"/>
  <path class="ai-line" d="M 875 754 C 915 695, 1035 695, 1135 705"/>
  <path class="ai-line" d="M 1330 754 C 1390 700, 1450 680, 1525 655"/>

  <g transform="translate(1180,125)">
    <rect x="0" y="0" width="310" height="92" rx="18" fill="#ffffff" stroke="#7c3aed" stroke-width="2" stroke-dasharray="8 7"/>
    <text x="155" y="31" text-anchor="middle" class="ai-text">AI is active, but bounded</text>
    <text x="155" y="58" text-anchor="middle" class="body-small">It plans, reviews, and drafts descriptions</text>
    <text x="155" y="79" text-anchor="middle" class="body-small">from evidence created by scripts</text>
  </g>
</svg>
